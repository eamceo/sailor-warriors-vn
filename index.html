<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#090817" />
  <title>Sailor Warriors — Чёрное Сердце Ангары</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <noscript>
    <div class="noscript">Для игры нужен включённый JavaScript.</div>
  </noscript>

  <div id="app" class="app-shell">
    <header class="topbar" aria-label="Верхняя панель игры">
      <div class="brand">
        <span class="brand__kicker">Visual Novel</span>
        <h1>Sailor Warriors</h1>
      </div>
      <div class="topbar__actions">
        <button id="voiceBtn" class="icon-btn" type="button" aria-label="Включить или выключить озвучку">Voice: ON</button>
        <button id="restartBtn" class="icon-btn" type="button" aria-label="Начать заново">Restart</button>
      </div>
    </header>

    <main id="screen" class="screen" aria-live="polite"></main>
  </div>

  <script src="script.js"></script>
</body>
</html>
